# ===========================================================================
# .github/workflows/sim.yml — GitHub Actions CI
# 触发时机：push 到任意分支，或提交 Pull Request
# 功能：
#   1. 构建 Docker 镜像（利用 layer cache 加速）
#   2. 在容器内运行 tb/uvm/ 的 pyuvm 仿真测试
#   3. 上传波形文件（.vcd）和 cocotb 日志作为 Artifact
# ===========================================================================
name: JTAG pyUVM 仿真 CI

on:
  push:
    branches: ["**"]       # 推送到任意分支时触发
  pull_request:
    branches: ["**"]       # 提交 PR 时触发

jobs:
  # --------------------------------------------------------------------------
  # Job: pyuvm-sim — 构建镜像并运行仿真
  # --------------------------------------------------------------------------
  pyuvm-sim:
    name: "pyUVM 仿真测试 (iverilog + cocotb)"
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 步骤 1：检出代码（含子模块）
      # -----------------------------------------------------------------------
      - name: 检出仓库
        uses: actions/checkout@v4
        # CI 只需 RTL + tb/uvm，不依赖任何 submodule，无需 submodules 选项

      # -----------------------------------------------------------------------
      # 步骤 2：设置 Docker Buildx（支持多平台构建和 cache）
      # -----------------------------------------------------------------------
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # 步骤 3：缓存 Docker 层（避免每次重新下载 apt 包和 pip 包）
      # -----------------------------------------------------------------------
      - name: 缓存 Docker 层
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # -----------------------------------------------------------------------
      # 步骤 4：构建 Docker 镜像
      # -----------------------------------------------------------------------
      - name: 构建仿真 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                        # 只构建，不推送到 registry
          load: true                         # 加载到本地 Docker daemon
          tags: simple_riscv_cpu_sim:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 避免 cache 无限增长（GitHub 推荐做法）
      - name: 轮换 Buildx 缓存
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # -----------------------------------------------------------------------
      # 步骤 5：运行 pyuvm 仿真
      #   - 挂载仓库到 /workspace
      #   - 执行 make sim（tb/uvm/Makefile）
      #   - 非零返回值 → CI 标红失败
      # -----------------------------------------------------------------------
      - name: 运行 JTAG pyUVM 仿真
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/tb/uvm \
            simple_riscv_cpu_sim:ci \
            make sim

      # -----------------------------------------------------------------------
      # 步骤 6：上传波形和日志（无论成功/失败都上传，方便调试）
      # -----------------------------------------------------------------------
      - name: 上传仿真 Artifacts（波形 + 日志）
        if: always()    # 仿真失败时也上传
        uses: actions/upload-artifact@v4
        with:
          name: sim-artifacts-${{ github.run_number }}
          path: |
            tb/uvm/*.vcd
            tb/uvm/results.xml
            tb/uvm/sim_build/
          retention-days: 7   # 保留 7 天
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # 步骤 7：打印仿真结果摘要（显示在 Actions 页面 Summary 里）
      # -----------------------------------------------------------------------
      - name: 输出结果摘要
        if: always()
        run: |
          echo "## JTAG pyUVM 仿真结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tb/uvm/results.xml ]; then
            echo "### cocotb 测试报告" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            cat tb/uvm/results.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ 未找到 results.xml，请查看 Actions 日志" >> $GITHUB_STEP_SUMMARY
          fi
